name: Otomatis Deploy ke Server

on:
  push:
    branches:
      - main   # Trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup SSH connection
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Deploy to server via SSH
      run: |
        ssh -p 21032 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            eval \$(ssh-agent -s)
            ssh-add ~/.ssh/wisnu
            ssh -T git@github.com
            cd web
            git fetch --all
            git reset --hard origin/main
            composer install
            composer update
            composer dump-autoload
            npm install
            npm run build
            php artisan optimize:clear
            php artisan migrate --force
            php artisan db:seed --class='Database\\Seeders\\Admin\\RolePermissionSeeder' --force
            php artisan db:seed --class='Database\\Seeders\\Reference\\PanduanSeeder' --force
            php artisan route:list | grep admin/asesi/bulk-delete
            php artisan config:cache
        "
