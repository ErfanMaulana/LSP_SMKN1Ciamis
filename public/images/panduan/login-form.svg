<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Mockup Form Login</title>
  <desc id="desc">Ilustrasi halaman login sistem LSP</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="#e2e8f0"/>
  <rect x="120" y="70" width="960" height="560" rx="22" fill="#ffffff"/>
  <rect x="120" y="70" width="420" height="560" rx="22" fill="url(#bg)"/>
  <text x="170" y="190" font-family="Arial, sans-serif" font-size="46" fill="#ffffff" font-weight="700">Selamat Datang</text>
  <text x="170" y="235" font-family="Arial, sans-serif" font-size="22" fill="#dbeafe">Login untuk mengakses panel sesuai peran.</text>
  <rect x="620" y="185" width="380" height="52" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="645" y="218" font-family="Arial, sans-serif" font-size="20" fill="#64748b">Username / Email</text>
  <rect x="620" y="260" width="380" height="52" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="645" y="293" font-family="Arial, sans-serif" font-size="20" fill="#64748b">Password</text>
  <rect x="620" y="335" width="380" height="52" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="645" y="368" font-family="Arial, sans-serif" font-size="20" fill="#64748b">Pilih Peran</text>
  <rect x="620" y="422" width="380" height="58" rx="12" fill="#0369a1"/>
  <text x="760" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">Login</text>
  <text x="120" y="665" font-family="Arial, sans-serif" font-size="18" fill="#475569">Mockup panduan: ganti dengan screenshot asli jika diperlukan.</text>
</svg>